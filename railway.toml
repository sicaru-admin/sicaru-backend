[build]
builder = "nixpacks"
buildCommand = "npm ci && npx medusa build"

[deploy]
startCommand = "npx medusa db:migrate && npx medusa start"
healthcheckPath = "/health"
healthcheckTimeout = 300
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[service]
internalPort = 9000
